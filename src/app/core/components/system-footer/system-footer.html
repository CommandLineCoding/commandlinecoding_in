<footer class="bottom-terminal-tray">
  <div class="terminal-banner">[SYSTEM_CONSOLE_LOG_STREAM]</div>
  
  <div class="terminal-log-scroller">
    @for (line of term.lines(); track $index) {
      <div class="log-line">{{ line }}</div>
    }
    <div #logEnd></div>
  </div>

  <div class="prompt-input-row">
    <span class="prompt-arrow">guest@mainframe:~$</span>
    <input 
      #cmdPrompt
      type="text" 
      class="terminal-core-input" 
      placeholder="Type console instruction... (e.g., help, ls, cd projects, clear)"
      (keydown)="onKeyDown($event, cmdPrompt)"
      (keydown.enter)="onSend(cmdPrompt)"
      autofocus
    />
  </div>
</footer>
